  <script type="module">

    import {
      EthereumClient,
      w3mConnectors,
      w3mProvider
    } from 'https://unpkg.com/@web3modal/ethereum@2.7.1/dist/index.js'

    import {
      Web3Modal
    } from 'https://unpkg.com/@web3modal/html@2.7.1/dist/index.js'

    import {
      configureChains,
      createConfig
    } from 'https://esm.sh/wagmi'

    import {
      mainnet,
      base
    } from 'https://esm.sh/wagmi/chains'

    const projectId =
      '24a3a3aaa955599c699d8dcd73aa065a'

    const chains = [
      mainnet,
      base
    ]

    const { publicClient } =
      configureChains(chains, [
        w3mProvider({ projectId })
      ])

    const wagmiConfig =
      createConfig({

        autoConnect: true,

        connectors:
          w3mConnectors({
            projectId,
            chains
          }),

        publicClient
      })

    const ethereumClient =
      new EthereumClient(
        wagmiConfig,
        chains
      )

    const modal =
      new Web3Modal(
        {
          projectId,
          themeMode: 'dark'
        },
        ethereumClient
      )

    window.connectWallet =
      async () => {

        try {

          await modal.openModal()

          const walletProvider =
            await modal.getWalletProvider()

          if (!walletProvider) return

          window.provider =
            new ethers.providers.Web3Provider(
              walletProvider
            )

          window.signer =
            window.provider.getSigner()

          const network =
            await window.provider.getNetwork()

          // 🔄 Switch Base Network
          if (network.chainId !== 8453) {

            await window.provider.send(
              'wallet_switchEthereumChain',
              [{ chainId: '0x2105' }]
            )
          }

          window.contract =
            new ethers.Contract(
              window.contractAddress,
              window.abi,
              window.signer
            )

          alert('Wallet Connected ✅')

        } catch(err) {

          console.error(err)

          alert(
            'Wallet connection failed'
          )
        }
      }

  </script>

  <!-- ✅ MAIN WEBSITE LOGIC -->
  <script>

    window.contractAddress =
      "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

    window.abi = [
      "function postConfession(string memory _message) payable",
      "function getTotalConfessions() view returns (uint256)",
      "function confessions(uint256) view returns (string memory, uint256, uint256)"
    ];

    const readProvider =
      new ethers.providers.JsonRpcProvider(
        "https://mainnet.base.org"
      );

    const readContract =
      new ethers.Contract(
        contractAddress,
        abi,
        readProvider
      );

    const blockedWords = [

      "kill",
      "murder",
      "bomb",
      "terror",
      "shoot",
      "stab",
      "kidnap",

      "rape",
      "pedo",
      "pedophile",

      "suicide",
      "selfharm",

      "fuck",
      "bitch",
      "sex",
      "anal",

      "nigga",
      "nigger",

      "genocide"
    ];

    function normalizeMessage(text) {

      return text

        .toLowerCase()

        .replace(/4/g, "a")
        .replace(/1/g, "i")
        .replace(/3/g, "e")
        .replace(/0/g, "o")
        .replace(/5/g, "s")
        .replace(/7/g, "t")

        .replace(/\s+/g, "")

        .replace(/[^a-z0-9]/g, "")

        .replace(/(.)\1+/g, "$1");
    }

    const messageInput =
      document.getElementById("message");

    const charCounter =
      document.getElementById("charCounter");

    messageInput.addEventListener("input", () => {

      if (
        messageInput.value.length > 125
      ) {

        messageInput.value =
          messageInput.value.slice(0, 125);
      }

      const length =
        messageInput.value.length;

      charCounter.innerText =
        `${length} / 125`;

      if (length < 100) {

        charCounter.style.color =
          "#64748b";

      } else if (length < 125) {

        charCounter.style.color =
          "#eab308";

      } else {

        charCounter.style.color =
          "#ef4444";
      }
    });

    async function postConfession() {

      if (!window.contract) {

        alert("Connect wallet first");
        return;
      }

      const msg =
        document.getElementById("message")
        .value
        .trim();

      if (!msg) {

        alert("Write something first");
        return;
      }

      try {

        const tx =
          await window.contract.postConfession(
            msg,
            {
              value:
                ethers.utils.parseEther(
                  "0.00001"
                )
            }
          );

        await tx.wait();

        document.getElementById(
          "message"
        ).value = "";

        charCounter.innerText =
          "0 / 125";

        await loadConfessions();

      } catch (err) {

        console.error(err);

        alert("Transaction failed");
      }
    }

    function formatTime(ts) {

      const now =
        Math.floor(Date.now() / 1000);

      const diff =
        now - ts;

      if (diff < 60)
        return "Just now";

      if (diff < 3600) {

        const m =
          Math.floor(diff / 60);

        return m +
          (m === 1
            ? " min ago"
            : " mins ago");
      }

      if (diff < 86400) {

        const h =
          Math.floor(diff / 3600);

        return h +
          (h === 1
            ? " hour ago"
            : " hours ago");
      }

      const d =
        Math.floor(diff / 86400);

      return d +
        (d === 1
          ? " day ago"
          : " days ago");
    }

    async function loadConfessions() {

      try {

        const total =
          await readContract.getTotalConfessions();

        const list =
          document.getElementById(
            "confessionList"
          );

        list.innerHTML = "";

        for (let i = 0; i < total; i++) {

          const c =
            await readContract.confessions(i);

          const div =
            document.createElement("div");

          div.style.width = "120px";
          div.style.height = "120px";
          div.style.position = "absolute";
          div.style.left =
            Math.random() * 80 + "%";
          div.style.top =
            Math.random() * 70 + "%";
          div.style.borderRadius = "50%";
          div.style.background =
            "rgba(255,255,255,0.3)";
          div.style.backdropFilter =
            "blur(10px)";
          div.style.display = "flex";
          div.style.alignItems = "center";
          div.style.justifyContent = "center";
          div.style.textAlign = "center";
          div.style.padding = "10px";
          div.style.cursor = "pointer";
          div.style.animation =
            "floatBubble 6s ease-in-out infinite";

          div.innerHTML = "";

          let revealed = false;

          div.onclick = () => {

            revealed = !revealed;

            if (revealed) {

              div.innerHTML = `
                <div>
                  <p style="
                    font-size:12px;
                    margin:0;
                  ">
                    ${c[0]}
                  </p>

                  <br>

                  <small>
                    ${formatTime(c[1])}
                  </small>
                </div>
              `;

            } else {

              div.innerHTML = "";
            }
          };

          list.appendChild(div);
        }

      } catch(err) {

        console.error(err)
      }
    }

    window.onload =
      async () => {

        await loadConfessions()
      }

  </script>

</body>
</html>
