<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      padding: 30px;
    }

    h2, h3,
    input, button,
    small {
      position: relative;
      z-index: 10;
    }

    #confessionList {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      overflow: hidden;
    }

    @keyframes floatBubble {

      0% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }

      25% {
        transform:
          translateY(-10px)
          translateX(4px)
          scale(1.02);
      }

      50% {
        transform:
          translateY(-18px)
          translateX(-4px)
          scale(0.98);
      }

      75% {
        transform:
          translateY(-8px)
          translateX(3px)
          scale(1.01);
      }

      100% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }
    }

    @keyframes burstBubble {

      0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }

      70% {
        transform: scale(1.25);
        opacity: 0.7;
        filter: blur(1px);
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
        filter: blur(4px);
      }
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <h2>🕵️ Anonymous Confession Wall</h2>

  <button
    onclick="connectWallet()"
    style="
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#111827;
      color:white;
      font-weight:bold;
    "
  >
    Connect Wallet
  </button>

  <br><br>

  <input
    id="message"
    placeholder="Share an anonymous thought..."
    style="padding:10px; width:260px;"
  />

  <button
    onclick="postConfession()"
    style="padding:10px;"
  >
    Post
  </button>

  <br><br>

  <small
    id="charCounter"
    style="color:#64748b;"
  >
    0 / 125
  </small>

  <br><br>

  <h3>🫧 Floating Confessions</h3>

  <div id="confessionList"></div>

  <!-- ✅ Ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- ✅ Modern Wallet Popup -->
  <script type="module">

    import {
      EthereumClient,
      w3mConnectors,
      w3mProvider
    } from 'https://unpkg.com/@web3modal/ethereum@2.7.1/dist/index.js'

    import {
      Web3Modal
    } from 'https://unpkg.com/@web3modal/html@2.7.1/dist/index.js'

    import {
      configureChains,
      createConfig
    } from 'https://esm.sh/wagmi'

    import {
      mainnet,
      base
    } from 'https://esm.sh/wagmi/chains'

    const projectId =
      '24a3a3aaa955599c699d8dcd73aa065a'

    const chains = [
      mainnet,
      base
    ]

    const { publicClient } =
      configureChains(chains, [
        w3mProvider({ projectId })
      ])

    const wagmiConfig =
      createConfig({

        autoConnect: true,

        connectors:
          w3mConnectors({
            projectId,
            chains
          }),

        publicClient
      })

    const ethereumClient =
      new EthereumClient(
        wagmiConfig,
        chains
      )

    const modal =
      new Web3Modal(
        {
          projectId,
          themeMode: 'dark'
        },
        ethereumClient
      )

    window.connectWallet =
      async () => {

        try {

          await modal.openModal()

          const walletProvider =
            await modal.getWalletProvider()

          if (!walletProvider) return

          window.provider =
            new ethers.providers.Web3Provider(
              walletProvider
            )

          window.signer =
            window.provider.getSigner()

          window.contract =
            new ethers.Contract(
              window.contractAddress,
              window.abi,
              window.signer
            )

          const network =
            await window.provider.getNetwork()

          if (network.chainId !== 8453) {

            await window.provider.send(
              'wallet_switchEthereumChain',
              [{ chainId: '0x2105' }]
            )
          }

          alert('Wallet Connected ✅')

        } catch(err) {

          console.error(err)

          alert(
            'Wallet connection failed'
          )
        }
      }

  </script>

  <!-- ✅ Main Website Logic -->
  <script>

    window.contractAddress =
      "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

    window.abi = [
      "function postConfession(string memory _message) payable",
      "function getTotalConfessions() view returns (uint256)",
      "function confessions(uint256) view returns (string memory, uint256, uint256)"
    ];

    const readProvider =
      new ethers.providers.JsonRpcProvider(
        "https://mainnet.base.org"
      );

    const readContract =
      new ethers.Contract(
        contractAddress,
        abi,
        readProvider
      );

    const blockedWords = [

      "kill",
      "murder",
      "bomb",
      "terror",
      "shoot",
      "stab",
      "kidnap",

      "rape",
      "pedo",
      "pedophile",

      "suicide",
      "selfharm",

      "fuck",
      "bitch",
      "sex",
      "anal",

      "nigga",
      "nigger",

      "genocide"
    ];

    function normalizeMessage(text) {

      return text

        .toLowerCase()

        .replace(/4/g, "a")
        .replace(/1/g, "i")
        .replace(/3/g, "e")
        .replace(/0/g, "o")
        .replace(/5/g, "s")
        .replace(/7/g, "t")

        .replace(/\s+/g, "")

        .replace(/[^a-z0-9]/g, "")

        .replace(/(.)\1+/g, "$1");
    }

    const messageInput =
      document.getElementById("message");

    const charCounter =
      document.getElementById("charCounter");

    messageInput.addEventListener("input", () => {

      if (
        messageInput.value.length > 125
      ) {

        messageInput.value =
          messageInput.value.slice(0, 125);
      }

      const length =
        messageInput.value.length;

      charCounter.innerText =
        `${length} / 125`;

      if (length < 100) {

        charCounter.style.color =
          "#64748b";

      } else if (length < 125) {

        charCounter.style.color =
          "#eab308";

      } else {

        charCounter.style.color =
          "#ef4444";
      }
    });

    async function postConfession() {

      if (!window.contract) {

        alert("Connect wallet first");
        return;
      }

      const msg =
        document.getElementById("message")
        .value
        .trim();

      if (!msg) {

        alert("Write something first");
        return;
      }

      const englishOnly =
        /^[a-zA-Z0-9\s.,!?'"()-]+$/;

      if (!englishOnly.test(msg)) {

        alert(
          "Only standard English text is allowed currently"
        );

        return;
      }

      const cleanedMsg =
        normalizeMessage(msg);

      for (const word of blockedWords) {

        if (
          cleanedMsg.includes(word)
        ) {

          alert(
            "Restricted words detected"
          );

          return;
        }
      }

      const now = Date.now();

      const lastPostTime =
        localStorage.getItem(
          "lastPostTime"
        );

      if (
        lastPostTime &&
        now - lastPostTime < 60000
      ) {

        alert(
          "Please wait 1 minute before posting again"
        );

        return;
      }

      let recentPosts =
        JSON.parse(
          localStorage.getItem(
            "recentPosts"
          )
        ) || [];

      if (
        recentPosts.includes(cleanedMsg)
      ) {

        alert(
          "Duplicate messages are not allowed"
        );

        return;
      }

      try {

        const tx =
          await window.contract.postConfession(
            msg,
            {
              value:
                ethers.utils.parseEther(
                  "0.00001"
                )
            }
          );

        await tx.wait();

        localStorage.setItem(
          "lastPostTime",
          now
        );

        recentPosts.push(cleanedMsg);

        if (
          recentPosts.length > 5
        ) {
          recentPosts.shift();
        }

        localStorage.setItem(
          "recentPosts",
          JSON.stringify(recentPosts)
        );

        document.getElementById(
          "message"
        ).value = "";

        charCounter.innerText =
          "0 / 125";

        charCounter.style.color =
          "#64748b";

        await loadConfessions();

      } catch (err) {

        console.error(err);

        alert("Transaction failed");
      }
    }

    function formatTime(ts) {

      const now =
        Math.floor(Date.now() / 1000);

      const diff =
        now - ts;

      if (diff < 60)
        return "Just now";

      if (diff < 3600) {

        const m =
          Math.floor(diff / 60);

        return m +
          (m === 1
            ? " min ago"
            : " mins ago");
      }

      if (diff < 86400) {

        const h =
          Math.floor(diff / 3600);

        return h +
          (h === 1
            ? " hour ago"
            : " hours ago");
      }

      const d =
        Math.floor(diff / 86400);

      return d +
        (d === 1
          ? " day ago"
          : " days ago");
    }

    async function loadConfessions() {

      try {

        const total =
          await readContract.getTotalConfessions();

        const list =
          document.getElementById(
            "confessionList"
          );

        list.innerHTML = "";

        const promises = [];

        const randomIndexes =
          new Set();

        const batchSize =
          Math.min(50, total);

        while (
          randomIndexes.size < batchSize
        ) {

          const randomIndex =
            Math.floor(
              Math.random() * total
            );

          randomIndexes.add(
            randomIndex
          );
        }

        for (const i of randomIndexes) {

          promises.push(
            readContract.confessions(i)
          );
        }

        const results =
          await Promise.all(promises);

        const placedBubbles = [];

        results.forEach((c) => {

          const div =
            document.createElement("div");

          const textLength =
            c[0].length;

          let size;

          if (textLength < 40) {

            size =
              Math.floor(
                Math.random() * 25
              ) + 70;

          } else if (textLength < 80) {

            size =
              Math.floor(
                Math.random() * 30
              ) + 95;

          } else {

            size =
              Math.floor(
                Math.random() * 35
              ) + 120;
          }

          div.style.width =
            size + "px";

          div.style.height =
            size + "px";

          div.style.position =
            "absolute";

          const maxX =
            window.innerWidth -
            size -
            60;

          const maxY =
            window.innerHeight -
            size -
            260;

          let x, y;
          let overlapping;

          do {

            overlapping = false;

            x =
              Math.random() * maxX;

            y =
              Math.random() *
              (maxY - 120) + 120;

            for (
              const bubble of placedBubbles
            ) {

              const dx =
                bubble.x - x;

              const dy =
                bubble.y - y;

              const distance =
                Math.sqrt(
                  dx * dx + dy * dy
                );

              if (
                distance <
                (
                  bubble.size / 2 +
                  size / 2 +
                  25
                )
              ) {

                overlapping = true;
                break;
              }
            }

          } while (overlapping);

          placedBubbles.push({
            x,
            y,
            size
          });

          div.style.left =
            x + "px";

          div.style.top =
            y + "px";

          div.style.borderRadius =
            "50%";

          div.style.display =
            "flex";

          div.style.alignItems =
            "center";

          div.style.justifyContent =
            "center";

          div.style.textAlign =
            "center";

          div.style.cursor =
            "pointer";

          div.style.padding =
            "12px";

          div.style.background = `
            radial-gradient(
              circle at 30% 30%,
              rgba(255,255,255,0.55),
              rgba(191,219,254,0.22),
              rgba(147,197,253,0.08),
              rgba(255,255,255,0.03)
            )
          `;

          div.style.backdropFilter =
            "blur(14px)";

          div.style.border =
            "1.5px solid rgba(255,255,255,0.35)";

          div.style.boxShadow = `
            0 0 20px rgba(59,130,246,0.18),
            0 0 35px rgba(168,85,247,0.12),
            0 0 50px rgba(236,72,153,0.08)
          `;

          div.style.transition =
            "0.3s";

          div.style.overflow =
            "hidden";

          div.style.animation =
            `floatBubble ${Math.random() * 4 + 4}s ease-in-out infinite`;

          div.innerHTML = "";

          div.onmouseenter = () => {
            div.style.transform =
              "scale(1.08)";
          };

          div.onmouseleave = () => {
            div.style.transform =
              "scale(1)";
          };

          let revealed = false;

          div.onclick = () => {

            revealed = !revealed;

            if (revealed) {

              div.style.animation =
                "burstBubble 0.35s ease";

              setTimeout(() => {

                div.style.animation =
                  `floatBubble ${Math.random() * 4 + 4}s ease-in-out infinite`;

                div.innerHTML = `
                  <div style="
                    padding:10px;
                    color:#111827;
                    animation:fadeIn 0.5s ease;
                  ">
                    <p style="
                      font-size:12px;
                      margin:0;
                      word-break:break-word;
                      line-height:1.3;
                    ">
                      ${c[0]}
                    </p>

                    <br>

                    <small style="
                      opacity:0.7;
                      font-size:10px;
                    ">
                      ${formatTime(c[1])}
                    </small>
                  </div>
                `;

              }, 250);

            } else {

              div.innerHTML = "";
            }
          };

          list.appendChild(div);
        });

      } catch (err) {

        console.error(err);
      }
    }

    window.onload = async () => {

      await loadConfessions();
    };

  </script>

</body>
</html>
