<!DOCTYPE html>
<html>
<head>
  <title>Anonymous Confession Wall</title>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      padding: 30px;
    }

    h2, h3,
    input, button,
    small {
      position: relative;
      z-index: 10;
    }

    #confessionList {
      position: relative;
      width: 100%;
      height: calc(100vh - 220px);
      overflow: hidden;
    }

    @keyframes floatBubble {

      0% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }

      25% {
        transform:
          translateY(-10px)
          translateX(4px)
          scale(1.02);
      }

      50% {
        transform:
          translateY(-18px)
          translateX(-4px)
          scale(0.98);
      }

      75% {
        transform:
          translateY(-8px)
          translateX(3px)
          scale(1.01);
      }

      100% {
        transform:
          translateY(0px)
          translateX(0px)
          scale(1);
      }
    }

    @keyframes burstBubble {

      0% {
        transform: scale(1);
        opacity: 1;
        filter: blur(0px);
      }

      70% {
        transform: scale(1.25);
        opacity: 0.7;
        filter: blur(1px);
      }

      100% {
        transform: scale(1.6);
        opacity: 0;
        filter: blur(4px);
      }
    }

    @keyframes fadeIn {

      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <h2>🕵️ Anonymous Confession Wall</h2>

  <div style="
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:10px;
  ">

    <button
      onclick="connectWallet()"
      style="
        padding:10px 14px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        background:#111827;
        color:white;
        font-weight:bold;
      "
    >
      Connect Wallet
    </button>

  </div>

  <br><br>

  <input
    id="message"
    placeholder="Share an anonymous thought..."
    style="padding:10px; width:260px;"
  />

  <button
    onclick="postConfession()"
    style="padding:10px;"
  >
    Post
  </button>

  <br><br>

  <small
    id="charCounter"
    style="color:#64748b;"
  >
    0 / 125
  </small>

  <br><br>

  <h3>🫧 Floating Confessions</h3>

  <div id="confessionList"></div>

  <!-- ✅ Ethers -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- ✅ Modern Wallet Popup -->
  <script type="module">

    import {
      EthereumClient,
      w3mConnectors,
      w3mProvider
    } from 'https://unpkg.com/@web3modal/ethereum@2.7.1/dist/index.js'

    import {
      Web3Modal
    } from 'https://unpkg.com/@web3modal/html@2.7.1/dist/index.js'

    import {
      configureChains,
      createConfig
    } from 'https://esm.sh/wagmi'

    import {
      mainnet,
      base
    } from 'https://esm.sh/wagmi/chains'

    const projectId =
      '24a3a3aaa955599c699d8dcd73aa065a'

    const chains = [
      mainnet,
      base
    ]

    const { publicClient } =
      configureChains(chains, [
        w3mProvider({ projectId })
      ])

    const wagmiConfig =
      createConfig({

        autoConnect: true,

        connectors:
          w3mConnectors({
            projectId,
            chains
          }),

        publicClient
      })

    const ethereumClient =
      new EthereumClient(
        wagmiConfig,
        chains
      )

    const modal =
      new Web3Modal(
        {
          projectId,
          themeMode: 'dark'
        },
        ethereumClient
      )

    window.contract = null
    window.provider = null
    window.signer = null

    const contractAddress =
      "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db";

    const abi = [
      "function postConfession(string memory _message) payable",
      "function getTotalConfessions() view returns (uint256)",
      "function confessions(uint256) view returns (string memory, uint256, uint256)"
    ];

    window.connectWallet =
      async () => {

        try {

          modal.openModal()

          modal.subscribeModal(async state => {

            if (!state.open) {

              const walletProvider =
                await modal.getWalletProvider()

              if (!walletProvider) return

              window.provider =
                new ethers.providers.Web3Provider(
                  walletProvider
                )

              window.signer =
                provider.getSigner()

              const network =
                await provider.getNetwork()

              if (network.chainId !== 8453) {

                await provider.send(
                  "wallet_switchEthereumChain",
                  [{ chainId: "0x2105" }]
                )
              }

              window.contract =
                new ethers.Contract(
                  contractAddress,
                  abi,
                  signer
                )

              alert(
                "Wallet Connected ✅"
              )
            }
          })

        } catch(err) {

          console.error(err)

          alert(
            "Wallet connection failed"
          )
        }
      }

  </script>

  <script>

    const readProvider =
      new ethers.providers.JsonRpcProvider(
        "https://mainnet.base.org"
      );

    const readContract =
      new ethers.Contract(
        "0x4f1ab8fcc85aaa20ffe3105add56b2d2185aa3db",
        [
          "function getTotalConfessions() view returns (uint256)",
          "function confessions(uint256) view returns (string memory, uint256, uint256)"
        ],
        readProvider
      );

    const blockedWords = [

      "kill",
      "murder",
      "bomb",
      "terror",
      "shoot",
      "stab",
      "kidnap",

      "rape",
      "pedo",
      "pedophile",

      "suicide",
      "selfharm",

      "fuck",
      "bitch",
      "sex",
      "anal",

      "nigga",
      "nigger",

      "genocide"
    ];

    function normalizeMessage(text) {

      return text

        .toLowerCase()

        .replace(/4/g, "a")
        .replace(/1/g, "i")
        .replace(/3/g, "e")
        .replace(/0/g, "o")
        .replace(/5/g, "s")
        .replace(/7/g, "t")

        .replace(/\s+/g, "")

        .replace(/[^a-z0-9]/g, "")

        .replace(/(.)\1+/g, "$1");
    }

    const messageInput =
      document.getElementById("message");

    const charCounter =
      document.getElementById("charCounter");

    messageInput.addEventListener("input", () => {

      if (
        messageInput.value.length > 125
      ) {

        messageInput.value =
          messageInput.value.slice(0, 125);
      }

      const length =
        messageInput.value.length;

      charCounter.innerText =
        `${length} / 125`;
    });

    async function postConfession() {

      if (!window.contract) {

        alert("Connect wallet first");
        return;
      }

      const msg =
        document.getElementById("message")
        .value
        .trim();

      if (!msg) {

        alert("Write something first");
        return;
      }

      try {

        const tx =
          await window.contract.postConfession(
            msg,
            {
              value:
                ethers.utils.parseEther(
                  "0.00001"
                )
            }
          );

        await tx.wait();

        alert(
          "Confession Posted ✅"
        )

        document.getElementById(
          "message"
        ).value = "";

        await loadConfessions();

      } catch (err) {

        console.error(err);

        alert("Transaction failed");
      }
    }

    function formatTime(ts) {

      const now =
        Math.floor(Date.now() / 1000);

      const diff =
        now - ts;

      if (diff < 60)
        return "Just now";

      if (diff < 3600) {

        const m =
          Math.floor(diff / 60);

        return m + " mins ago";
      }

      if (diff < 86400) {

        const h =
          Math.floor(diff / 3600);

        return h + " hours ago";
      }

      const d =
        Math.floor(diff / 86400);

      return d + " days ago";
    }

    async function loadConfessions() {

      try {

        const total =
          await readContract.getTotalConfessions();

        const list =
          document.getElementById(
            "confessionList"
          );

        list.innerHTML = "";

      } catch (err) {

        console.error(err);
      }
    }

    window.onload = async () => {

      await loadConfessions();
    };

  </script>

</body>
</html>
